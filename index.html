<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#FAFAF7" />
  <title>Green Garden — Acceso</title>
  <link rel="stylesheet" href="css/estilos.css" />
</head>
<body>

  <div id="pantalla-carga">
    <div class="logo-loading">
      <div class="icon-loading"><svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#2d6a4f" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5.5 20C5 12.5 9.8 5.5 20 4.5c1 10-5 15.5-14.5 15.5Z"/><path d="M8.5 17c2.2-4.3 5.4-7 9.5-8.2"/></svg></div>
      Green Garden
    </div>
    <div class="spinner spinner-verde"></div>
  </div>

  <div class="app-wrapper" id="contenido" style="display:none;">
    <div class="login-screen">

      <div class="login-logo">
        <img src="logo.png" alt="Green Garden" style="display:block;width:78%;max-width:250px;height:auto;margin:0 auto 6px;" />
        <p>Sistema de Inventario</p>
      </div>

      <!-- ── Panel Login ── -->
      <div id="panel-login">
        <div class="card">
          <p class="card-title">Iniciar sesión</p>

          <div class="form-group">
            <label class="form-label" for="email">Correo electrónico</label>
            <input class="form-control" type="email" id="email"
              placeholder="usuario@greengarden.com"
              autocomplete="email" inputmode="email" />
          </div>

          <div class="form-group mb-0">
            <label class="form-label" for="password">Contraseña</label>
            <input class="form-control" type="password" id="password"
              placeholder="••••••••" autocomplete="current-password" />
          </div>

          <div id="msg-login" class="msg msg-error"></div>

          <div class="mt-16">
            <button class="btn btn-primary" id="btn-login">Ingresar</button>
          </div>
        </div>

        <p class="text-center mt-8">
          <button id="btn-ir-reset" style="background:none;border:none;color:var(--verde);font-family:var(--font);font-size:0.85rem;font-weight:500;cursor:pointer;text-decoration:underline;">
            ¿Olvidaste tu contraseña?
          </button>
        </p>
      </div>

      <!-- ── Panel Recuperar contraseña ── -->
      <div id="panel-reset" style="display:none;">
        <div class="card">
          <p class="card-title">Recuperar contraseña</p>

          <p style="font-size:0.85rem;color:var(--texto-2);margin-bottom:16px;">
            Ingresá tu email y te mandamos un link para resetear tu contraseña.
          </p>

          <div class="form-group mb-0">
            <label class="form-label" for="email-reset">Correo electrónico</label>
            <input class="form-control" type="email" id="email-reset"
              placeholder="usuario@greengarden.com"
              inputmode="email" />
          </div>

          <div id="msg-reset" class="msg"></div>

          <div class="mt-16">
            <button class="btn btn-primary" id="btn-enviar-reset">Enviar link</button>
          </div>
        </div>

        <p class="text-center mt-8">
          <button id="btn-volver-login" style="background:none;border:none;color:var(--texto-3);font-family:var(--font);font-size:0.85rem;font-weight:500;cursor:pointer;text-decoration:underline;">
            ← Volver al login
          </button>
        </p>
      </div>

    </div>
  </div>

  <script type="module">
    import { login, redirigirSiYaLogeado } from "./js/auth.js";
    import { sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { auth } from "./js/firebase-config.js";

    const pantallaCarga  = document.getElementById("pantalla-carga");
    const contenido      = document.getElementById("contenido");
    const panelLogin     = document.getElementById("panel-login");
    const panelReset     = document.getElementById("panel-reset");
    const btnLogin       = document.getElementById("btn-login");
    const msgLogin       = document.getElementById("msg-login");
    const inputEmail     = document.getElementById("email");
    const inputPass      = document.getElementById("password");
    const btnIrReset     = document.getElementById("btn-ir-reset");
    const btnVolverLogin = document.getElementById("btn-volver-login");
    const btnEnviarReset = document.getElementById("btn-enviar-reset");
    const inputEmailReset = document.getElementById("email-reset");
    const msgReset       = document.getElementById("msg-reset");

    function revelarLogin() {
      if (revelarLogin._hecho) return;
      revelarLogin._hecho = true;
      pantallaCarga.style.opacity = "0";
      setTimeout(() => {
        pantallaCarga.style.display = "none";
        contenido.style.display = "flex";
      }, 300);
    }
    // Mostramos el login apenas Firebase confirma que no hay sesión activa.
    // Si la hay, redirigirSiYaLogeado redirige y el login nunca se ve.
    redirigirSiYaLogeado(revelarLogin);
    // Red de seguridad: si el chequeo de sesión tardara demasiado, mostramos igual.
    setTimeout(revelarLogin, 2500);

    // ── Cambiar entre paneles ──
    btnIrReset.addEventListener("click", () => {
      panelLogin.style.display = "none";
      panelReset.style.display = "block";
      inputEmailReset.value = inputEmail.value; // pre-completar si ya escribió el email
      msgReset.classList.remove("show");
    });

    btnVolverLogin.addEventListener("click", () => {
      panelReset.style.display = "none";
      panelLogin.style.display = "block";
      msgLogin.classList.remove("show");
    });

    // ── Login ──
    async function intentarLogin() {
      const email    = inputEmail.value.trim();
      const password = inputPass.value;
      if (!email || !password) { mostrarMsgLogin("error", "Completá todos los campos."); return; }

      btnLogin.disabled = true;
      btnLogin.innerHTML = '<span class="spinner"></span>';
      msgLogin.classList.remove("show");

      try {
        await login(email, password);
      } catch (err) {
        btnLogin.disabled = false;
        btnLogin.innerHTML = "Ingresar";
        const cod = err.code || "";
        if (cod.includes("invalid-credential") || cod.includes("wrong-password") || cod.includes("user-not-found")) {
          mostrarMsgLogin("error", "Email o contraseña incorrectos.");
        } else if (cod.includes("too-many-requests")) {
          mostrarMsgLogin("error", "Demasiados intentos. Esperá unos minutos.");
        } else {
          mostrarMsgLogin("error", err.message || "Error al ingresar.");
        }
      }
    }

    btnLogin.addEventListener("click", intentarLogin);
    [inputEmail, inputPass].forEach(i => {
      i.addEventListener("keydown", e => { if (e.key === "Enter") intentarLogin(); });
    });

    // ── Reset contraseña ──
    btnEnviarReset.addEventListener("click", async () => {
      const email = inputEmailReset.value.trim();
      if (!email) { mostrarMsgReset("error", "Ingresá tu email."); return; }

      btnEnviarReset.disabled = true;
      btnEnviarReset.innerHTML = '<span class="spinner"></span>';
      msgReset.classList.remove("show");

      try {
        await sendPasswordResetEmail(auth, email);
        mostrarMsgReset("ok", "¡Listo! Revisá tu email y seguí el link para resetear tu contraseña.");
        btnEnviarReset.innerHTML = "Enviar link";
        // No re-habilitamos el botón para evitar spam
      } catch (err) {
        btnEnviarReset.disabled = false;
        btnEnviarReset.innerHTML = "Enviar link";
        const cod = err.code || "";
        if (cod.includes("user-not-found") || cod.includes("invalid-email")) {
          mostrarMsgReset("error", "No encontramos una cuenta con ese email.");
        } else {
          mostrarMsgReset("error", "Error al enviar. Intentá de nuevo.");
        }
      }
    });

    inputEmailReset.addEventListener("keydown", e => {
      if (e.key === "Enter") btnEnviarReset.click();
    });

    function mostrarMsgLogin(tipo, txt) {
      msgLogin.textContent = txt;
      msgLogin.className = `msg show msg-${tipo === "error" ? "error" : "ok"}`;
    }
    function mostrarMsgReset(tipo, txt) {
      msgReset.textContent = txt;
      msgReset.className = `msg show msg-${tipo === "error" ? "error" : "ok"}`;
    }

  </script>

  <div class="app-version"></div>
  <script type="module" src="./js/version.js"></script>
</body>
</html>
